<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Smart Grocery List - HOMELY</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#D47E30",
                        "primary-dark": "#b06622",
                        "secondary": "#825E34",
                        "fab-color": "#8D5A2B",
                        "background-light": "#FDFBD4",
                        "background-dark": "#201912",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .custom-checkbox {
            appearance: none;
            background-color: transparent;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.5rem;
            height: 1.5rem;
            border: 2px solid #825E34;
            border-radius: 50%;
            display: grid;
            place-content: center;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .custom-checkbox::before {
            content: "";
            width: 0.85em;
            height: 0.85em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .custom-checkbox:checked {
            background-color: #D47E30;
            border-color: #D47E30;
        }

        .custom-checkbox:checked::before {
            transform: scale(1);
        }

        .peer:checked~.item-text {
            text-decoration: line-through;
            color: #825E34;
            opacity: 0.6;
        }
    </style>
</head>

<body class="bg-homely-bg dark:bg-background-dark font-display antialiased text-[#1a140f] dark:text-[#f2ede8]">
    <div
        class="relative flex min-h-screen w-full flex-col overflow-hidden max-w-md mx-auto shadow-2xl bg-homely-bg dark:bg-background-dark">
        <header
            class="sticky top-0 z-20 flex items-center justify-between px-6 pt-12 pb-4 bg-homely-bg/95 dark:bg-background-dark/95 backdrop-blur-md border-b border-[#825E34]/10">
            <h1 class="text-2xl font-bold tracking-tight text-[#1a140f] dark:text-white">Grocery List</h1>
            <button
                class="flex items-center justify-center w-10 h-10 rounded-full text-secondary hover:bg-secondary/10 transition-colors"
                data-target="user_dashboard.html">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
        </header>
        <main class="flex-1 overflow-y-auto px-6 pb-24">
            <div class="mt-6">
                <div class="flex items-center gap-3 mb-4">
                    <div class="bg-secondary/10 p-2 rounded-full text-secondary">
                        <span class="material-symbols-outlined text-[20px]">nutrition</span>
                    </div>
                    <h2 class="text-xl font-bold text-secondary">Produce</h2>
                    <div class="h-px bg-secondary/20 flex-1 ml-2"></div>
                </div>
                <div class="space-y-3">
                    <label
                        class="group flex items-center gap-4 p-4 bg-white dark:bg-[#2C241B] rounded-2xl shadow-sm border border-[#825E34]/10 cursor-pointer transition-all hover:shadow-md active:scale-[0.99]">
                        <input class="peer grocery-checkbox custom-checkbox" type="checkbox" />
                        <div class="flex flex-col flex-1 item-text transition-opacity duration-200">
                            <span class="text-base font-semibold text-slate-900 dark:text-slate-100">Avocados</span>
                            <span class="text-sm text-secondary/70 font-medium">2 units • Ripe</span>
                        </div>
                    </label>
                    <label
                        class="group flex items-center gap-4 p-4 bg-white dark:bg-[#2C241B] rounded-2xl shadow-sm border border-[#825E34]/10 cursor-pointer transition-all hover:shadow-md active:scale-[0.99]">
                        <input class="peer grocery-checkbox custom-checkbox" type="checkbox" />
                        <div class="flex flex-col flex-1 item-text transition-opacity duration-200">
                            <span class="text-base font-semibold text-slate-900 dark:text-slate-100">Spinach</span>
                            <span class="text-sm text-secondary/70 font-medium">1 bag • Organic</span>
                        </div>
                    </label>
                    <label
                        class="group flex items-center gap-4 p-4 bg-white dark:bg-[#2C241B] rounded-2xl shadow-sm border border-[#825E34]/10 cursor-pointer transition-all hover:shadow-md active:scale-[0.99]">
                        <input checked="" class="peer grocery-checkbox custom-checkbox" type="checkbox" />
                        <div class="flex flex-col flex-1 item-text transition-opacity duration-200">
                            <span class="text-base font-semibold text-slate-900 dark:text-slate-100">Bananas</span>
                            <span class="text-sm text-secondary/70 font-medium">1 bunch</span>
                        </div>
                    </label>
                </div>
            </div>
            <div class="mt-8">
                <div class="flex items-center gap-3 mb-4">
                    <div class="bg-secondary/10 p-2 rounded-full text-secondary">
                        <span class="material-symbols-outlined text-[20px]">egg_alt</span>
                    </div>
                    <h2 class="text-xl font-bold text-secondary">Dairy &amp; Eggs</h2>
                    <div class="h-px bg-secondary/20 flex-1 ml-2"></div>
                </div>
                <div class="space-y-3">
                    <label
                        class="group flex items-center gap-4 p-4 bg-white dark:bg-[#2C241B] rounded-2xl shadow-sm border border-[#825E34]/10 cursor-pointer transition-all hover:shadow-md active:scale-[0.99]">
                        <input class="peer grocery-checkbox custom-checkbox" type="checkbox" />
                        <div class="flex flex-col flex-1 item-text transition-opacity duration-200">
                            <span class="text-base font-semibold text-slate-900 dark:text-slate-100">Whole Milk</span>
                            <span class="text-sm text-secondary/70 font-medium">1 gallon</span>
                        </div>
                    </label>
                    <label
                        class="group flex items-center gap-4 p-4 bg-white dark:bg-[#2C241B] rounded-2xl shadow-sm border border-[#825E34]/10 cursor-pointer transition-all hover:shadow-md active:scale-[0.99]">
                        <input class="peer grocery-checkbox custom-checkbox" type="checkbox" />
                        <div class="flex flex-col flex-1 item-text transition-opacity duration-200">
                            <span class="text-base font-semibold text-slate-900 dark:text-slate-100">Large Brown
                                Eggs</span>
                            <span class="text-sm text-secondary/70 font-medium">1 dozen</span>
                        </div>
                    </label>
                </div>
            </div>
            <div class="mt-8">
                <div class="flex items-center gap-3 mb-4">
                    <div class="bg-secondary/10 p-2 rounded-full text-secondary">
                        <span class="material-symbols-outlined text-[20px]">grocery</span>
                    </div>
                    <h2 class="text-xl font-bold text-secondary">Spices</h2>
                    <div class="h-px bg-secondary/20 flex-1 ml-2"></div>
                </div>
                <div class="space-y-3">
                    <label
                        class="group flex items-center gap-4 p-4 bg-white dark:bg-[#2C241B] rounded-2xl shadow-sm border border-[#825E34]/10 cursor-pointer transition-all hover:shadow-md active:scale-[0.99]">
                        <input class="peer grocery-checkbox custom-checkbox" type="checkbox" />
                        <div class="flex flex-col flex-1 item-text transition-opacity duration-200">
                            <span class="text-base font-semibold text-slate-900 dark:text-slate-100">Cumin</span>
                            <span class="text-sm text-secondary/70 font-medium">1 jar</span>
                        </div>
                    </label>
                    <label
                        class="group flex items-center gap-4 p-4 bg-white dark:bg-[#2C241B] rounded-2xl shadow-sm border border-[#825E34]/10 cursor-pointer transition-all hover:shadow-md active:scale-[0.99]">
                        <input class="peer grocery-checkbox custom-checkbox" type="checkbox" />
                        <div class="flex flex-col flex-1 item-text transition-opacity duration-200">
                            <span class="text-base font-semibold text-slate-900 dark:text-slate-100">Smoked
                                Paprika</span>
                            <span class="text-sm text-secondary/70 font-medium">1 tin</span>
                        </div>
                    </label>
                </div>
            </div>
            <div class="mt-10 mb-6 text-center opacity-60">
                <p class="text-sm text-secondary font-medium italic">"A well-stocked pantry is a happy home."</p>
            </div>
        </main>
        <div class="fixed bottom-20 left-1/2 -translate-x-1/2 w-[calc(100%-3rem)] max-w-[380px] z-30 flex gap-3">
            <button
                class="flex-1 bg-white text-secondary font-bold text-sm py-3.5 rounded-full shadow-lg shadow-[#825E34]/10 border border-[#825E34]/20 flex items-center justify-center gap-2 nav-btn hover:bg-[#825E34]/5 transition-colors"
                data-target="order_ingredients.html">
                <span class="material-symbols-outlined text-[20px]">shopping_bag</span>
                Order Ingredients
            </button>
            <button
                class="flex items-center justify-center w-14 h-14 bg-fab-color text-white rounded-full shadow-lg shadow-[#8D5A2B]/40 hover:brightness-110 transition-all active:scale-95 nav-btn"
                data-target="ingredient_selection.html">
                <span class="material-symbols-outlined text-[32px]">add</span>
            </button>
        </div>
        <div id="bottom-nav"></div>
    </div>

    <script>
            (async function () {
                setTimeout(async () => {
                    const checkboxes = document.querySelectorAll('.grocery-checkbox');

                    // Add unique identifiers to the UI elements dynamically if they don't have them
                    checkboxes.forEach((cb, index) => {
                        const itemName = cb.parentElement.querySelector('.item-text span:first-child').innerText.replace(/\s+/g, '_').toLowerCase();
                        cb.dataset.itemId = itemName;
                    });

                    if (window.homelyAuth && window.homelyAuth.currentUser && window.homelyFirestore) {
                        const uid = window.homelyAuth.currentUser.uid;
                        const { doc, getDoc, setDoc, deleteDoc } = window.homelyFirestore;

                        // Load checked state
                        try {
                            // Using a single document to store the grocery checklist state
                            const listRef = doc(window.homelyDb, 'users', uid, 'grocery', 'checklist_state');
                            const snap = await getDoc(listRef);

                            if (snap.exists()) {
                                const data = snap.data();
                                checkboxes.forEach(cb => {
                                    const id = cb.dataset.itemId;
                                    if (data[id] !== undefined) {
                                        cb.checked = data[id];
                                    }
                                });
                            }
                        } catch (err) {
                            console.error("Failed to load grocery state", err);
                        }

                        // Save state on change
                        checkboxes.forEach(cb => {
                            cb.addEventListener('change', async () => {
                                try {
                                    const listRef = doc(window.homelyDb, 'users', uid, 'grocery', 'checklist_state');
                                    const id = cb.dataset.itemId;
                                    const update = { updatedAt: Date.now() };
                                    update[id] = cb.checked;

                                    await setDoc(listRef, update, { merge: true });
                                } catch (err) {
                                    console.error("Failed to save checkbox state", err);
                                }
                            });
                        });
                    }
                }, 300);
            })();
    </script>
</body>

</html>
