<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Meal Success Celebration Screen</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8c5a2b",
                        "primary-dark": "#825e34",
                        "accent": "#d47e30",
                        "cream": "#fdfbd4",
                        "background-light": "#fdfbd4",
                        "background-dark": "#1e1914",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "1.5rem",
                        "xl": "2rem",
                        "2xl": "2.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        /* Custom scrollbar hiding */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center overflow-hidden relative">
    <!-- Decorative background elements -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] right-[-10%] w-64 h-64 rounded-full bg-accent/10 blur-3xl"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-80 h-80 rounded-full bg-primary/10 blur-3xl"></div>
    </div>
    <!-- Main Container (Simulating Mobile Screen) -->
    <div class="relative w-full max-w-md h-full min-h-screen flex flex-col z-10 px-6 pt-12 pb-8">
        <!-- Header Section -->
        <header class="flex flex-col items-center justify-center mb-6 mt-4">
            <div
                class="inline-flex items-center justify-center p-2 bg-white/40 rounded-full mb-4 shadow-sm backdrop-blur-sm">
                <span class="material-symbols-outlined text-accent text-2xl">celebration</span>
            </div>
            <h1
                class="text-primary dark:text-cream text-[32px] md:text-4xl font-extrabold leading-tight tracking-tight text-center drop-shadow-sm">
                Chef-Kiss Level!
            </h1>
            <p class="text-primary/70 dark:text-cream/70 text-base font-medium mt-1 text-center">
                You absolutely nailed it.
            </p>
        </header>
        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col items-center justify-start gap-6 w-full">
            <!-- Hero Image Container -->
            <div class="relative w-full aspect-[4/3] group perspective-1000">
                <!-- Decorative Stars -->
                <div
                    class="absolute -top-3 -right-3 z-20 bg-accent text-cream p-2 rounded-full shadow-lg transform rotate-12 flex items-center justify-center">
                    <span class="material-symbols-outlined text-2xl font-bold">star</span>
                </div>
                <div
                    class="absolute top-10 -left-4 z-20 bg-accent text-cream p-1.5 rounded-full shadow-lg transform -rotate-12 flex items-center justify-center animate-bounce duration-[2000ms]">
                    <span class="material-symbols-outlined text-xl font-bold">star</span>
                </div>
                <div
                    class="absolute -bottom-2 right-4 z-20 bg-white text-accent p-2 rounded-full shadow-md transform rotate-6 flex items-center justify-center">
                    <span class="material-symbols-outlined text-xl font-bold">thumb_up</span>
                </div>
                <!-- Image -->
                <div class="w-full h-full rounded-[2rem] bg-cover bg-center shadow-xl border-4 border-white/50 relative overflow-hidden transform transition-transform duration-500 hover:scale-[1.02]"
                    data-alt="Delicious butter chicken dish in a rustic bowl with naan bread"
                    style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAclTpGdHz6mNJkWAg2c11e6-gbpGoM5PU5kmJpfrKG78rTBiY2btqHja3AGnK1BKhppctYzT8ubsZMZuw-5ipey1AvFe9HxT0T9xf7iQJjmVST_x5TnO802qrENL7L3EpGwaOdlyHNR-f8bfIvjrXaoXpNuDZ3iNygtl-69P-tV2a_MU6GYbIFs9cq9zkzlFUSa3I7aDBf7s_dkFAzDd7TVAcvDyjVX9GATydrgdLf1cCuEZVh-azz1EXF3vE-01NdNRU-Fs6Yy-Q');">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
                </div>
            </div>
            <!-- Stats Grid -->
            <div class="grid grid-cols-3 gap-3 w-full mt-2">
                <!-- Stat Card 1: Time -->
                <div
                    class="flex flex-col items-center justify-center gap-1 bg-primary-dark rounded-2xl p-3 shadow-lg transform transition hover:-translate-y-1">
                    <div class="bg-white/10 p-2 rounded-full mb-1">
                        <span class="material-symbols-outlined text-cream text-xl">timer</span>
                    </div>
                    <p class="text-cream/80 text-xs font-semibold uppercase tracking-wider">Time</p>
                    <p class="text-cream text-lg font-bold">40m</p>
                </div>
                <!-- Stat Card 2: Pantry -->
                <div
                    class="flex flex-col items-center justify-center gap-1 bg-primary-dark rounded-2xl p-3 shadow-lg transform transition hover:-translate-y-1 delay-75">
                    <div class="bg-white/10 p-2 rounded-full mb-1">
                        <span class="material-symbols-outlined text-cream text-xl">inventory_2</span>
                    </div>
                    <p class="text-cream/80 text-xs font-semibold uppercase tracking-wider">Saved</p>
                    <p class="text-cream text-lg font-bold">6 Items</p>
                </div>
                <!-- Stat Card 3: Skill -->
                <div
                    class="flex flex-col items-center justify-center gap-1 bg-primary-dark rounded-2xl p-3 shadow-lg relative overflow-hidden transform transition hover:-translate-y-1 delay-150">
                    <!-- Subtle glow effect for XP -->
                    <div class="absolute top-0 right-0 w-8 h-8 bg-accent/30 rounded-full blur-md"></div>
                    <div class="bg-white/10 p-2 rounded-full mb-1 relative z-10">
                        <span class="material-symbols-outlined text-cream text-xl">bolt</span>
                    </div>
                    <p class="text-cream/80 text-xs font-semibold uppercase tracking-wider relative z-10">Level Up</p>
                    <p class="text-cream text-lg font-bold relative z-10">+10 XP</p>
                </div>
            </div>
            <!-- Recipe Name (Optional context) -->
            <div class="text-center mt-2">
                <h3 class="text-primary-dark/80 text-lg font-bold">Butter Chicken &amp; Naan</h3>
            </div>
        </main>
        <!-- Footer Actions -->
        <footer class="w-full flex flex-col gap-3 mt-auto pt-6">
            <!-- Primary Button -->
            <button
                class="w-full h-14 bg-primary hover:bg-primary/90 text-cream text-lg font-bold rounded-full shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-all active:scale-[0.98]"
                data-target="user_dashboard.html">
                <span class="material-symbols-outlined">check_circle</span>
                Finish &amp; Save
            </button>
            <!-- Secondary Button -->
            <button
                class="w-full h-14 bg-accent hover:bg-accent/90 text-cream text-lg font-bold rounded-full shadow-lg shadow-accent/20 flex items-center justify-center gap-2 transition-all active:scale-[0.98]">
                <span class="material-symbols-outlined">share</span>
                Share with Family
            </button>
        </footer>
    </div>
</body>

</html>
