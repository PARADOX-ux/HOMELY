<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>AI Kitchen Assistant Chat</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d57f30",
                        "primary-dark": "#b06624",
                        "background-light": "#FDFBD4", // Specific requested background
                        "background-dark": "#201912",
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#2d241a",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Plus Jakarta Sans", "sans-serif"],
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "1.5rem", "xl": "2rem", "2xl": "3rem", "full": "9999px" },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(213, 127, 48, 0.1)',
                        'float': '0 8px 30px rgba(0,0,0,0.08)',
                    }
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Custom Scrollbar for horizontal scrolling */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col antialiased selection:bg-primary/20">
    <!-- Header -->
    <header
        class="sticky top-0 z-50 flex items-center justify-between px-4 py-3 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md border-b border-primary/5 dark:border-white/5">
        <button
            class="flex items-center justify-center w-10 h-10 rounded-full text-slate-800 dark:text-slate-200 hover:bg-black/5 dark:hover:bg-white/10 transition-colors"
            onclick="window.navigate('user_dashboard.html')">
            <span class="material-symbols-outlined">arrow_back_ios_new</span>
        </button>
        <div class="flex flex-col items-center">
            <h1 class="text-slate-900 dark:text-white text-lg font-bold tracking-tight">AI Kitchen Helper</h1>
            <div class="flex items-center gap-1.5">
                <span class="relative flex h-2 w-2">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                <span class="text-xs font-medium text-primary uppercase tracking-wider">Online</span>
            </div>
        </div>
        <button
            class="flex items-center justify-center w-10 h-10 rounded-full text-slate-800 dark:text-slate-200 hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
            <span class="material-symbols-outlined">more_vert</span>
        </button>
    </header>
    <!-- Chat Area -->
    <main id="chat-container" class="flex-1 overflow-y-auto px-4 py-6 space-y-6 pb-40">
        <!-- Timestamp -->
        <div class="flex justify-center">
            <span
                class="text-xs font-medium text-slate-400 dark:text-slate-500 bg-black/5 dark:bg-white/5 px-3 py-1 rounded-full">Today</span>
        </div>
        <!-- AI Message (Welcome) -->
        <div class="flex items-end gap-3 group">
            <div
                class="w-8 h-8 rounded-full bg-gradient-to-br from-primary to-orange-400 flex items-center justify-center shadow-sm shrink-0 text-white">
                <span class="material-symbols-outlined text-[18px]">auto_awesome</span>
            </div>
            <div class="flex flex-col gap-1 max-w-[85%]">
                <span class="text-xs text-slate-500 dark:text-slate-400 ml-1 font-medium">Homely AI</span>
                <div
                    class="p-4 bg-primary text-white rounded-2xl rounded-bl-sm shadow-soft text-[15px] leading-relaxed">
                    <p>Hello! I'm your Homely AI Kitchen Assistant. What are we cooking today?</p>
                </div>
            </div>
        </div>
    </main>
    <!-- Floating Bottom Area (Input) -->
    <div
        class="fixed bottom-0 left-0 w-full bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark pt-12 pb-6 px-4 z-40">
        <!-- Quick Suggestions -->
        <div class="flex gap-2 overflow-x-auto hide-scrollbar mb-4 pb-2 snap-x">
            <button
                class="quick-prompt-btn snap-start shrink-0 h-9 px-4 rounded-full bg-white dark:bg-surface-dark border border-primary/20 shadow-sm text-primary dark:text-primary-dark text-sm font-semibold whitespace-nowrap active:scale-95 transition-transform flex items-center gap-2">
                <span class="material-symbols-outlined text-[18px]">kitchen</span>
                Cook from Pantry
            </button>
            <button
                class="quick-prompt-btn snap-start shrink-0 h-9 px-4 rounded-full bg-white dark:bg-surface-dark border border-primary/20 shadow-sm text-primary dark:text-primary-dark text-sm font-semibold whitespace-nowrap active:scale-95 transition-transform flex items-center gap-2">
                <span class="material-symbols-outlined text-[18px]">favorite</span>
                Healthy Options
            </button>
            <button
                class="quick-prompt-btn snap-start shrink-0 h-9 px-4 rounded-full bg-white dark:bg-surface-dark border border-primary/20 shadow-sm text-primary dark:text-primary-dark text-sm font-semibold whitespace-nowrap active:scale-95 transition-transform flex items-center gap-2">
                <span class="material-symbols-outlined text-[18px]">timer</span>
                Quick 15-min
            </button>
            <button
                class="quick-prompt-btn snap-start shrink-0 h-9 px-4 rounded-full bg-white dark:bg-surface-dark border border-primary/20 shadow-sm text-primary dark:text-primary-dark text-sm font-semibold whitespace-nowrap active:scale-95 transition-transform flex items-center gap-2">
                <span class="material-symbols-outlined text-[18px]">list_alt</span>
                Step-by-Step Guide
            </button>
        </div>
        <!-- Input Bar -->
        <div class="flex items-center gap-3 relative z-50">
            <div
                class="flex-1 relative shadow-float rounded-full bg-white dark:bg-surface-dark h-14 flex items-center transition-all focus-within:ring-2 focus-within:ring-primary/50">
                <input id="chat-input"
                    class="w-full h-full bg-transparent border-none focus:ring-0 px-6 text-slate-800 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 text-base rounded-full"
                    placeholder="Ask me anything..." type="text" autocomplete="off" />
            </div>
            <button id="send-btn"
                class="h-14 w-14 shrink-0 rounded-full bg-primary text-white shadow-lg shadow-primary/40 flex items-center justify-center active:scale-95 active:shadow-inner transition-all hover:bg-primary-dark group relative overflow-hidden">
                <span class="material-symbols-outlined text-[28px] pointer-events-none">send</span>
            </button>
        </div>
        <!-- Safe Area Spacer for iOS Home Indicator -->
        <div class="h-1"></div>
    </div>

    <!-- Gemini API Wiring -->
    <script>
        const GEMINI_API_KEY = "AIzaSyA8yJxNBLUj_n-MkboT7MzBQwJRnti4-QU"; // IMPORTANT: Replace this with your actual Gemini API Key

        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        // Function to create User UI bubble
        function appendUserMessage(text) {
            const html = `
                <div class="flex items-end gap-3 justify-end group">
                    <div class="flex flex-col gap-1 items-end max-w-[80%]">
                        <div class="p-4 bg-white dark:bg-surface-dark text-slate-800 dark:text-slate-100 rounded-2xl rounded-br-sm shadow-float text-[15px] leading-relaxed">
                            <p>${text}</p>
                        </div>
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        // Function to create AI UI bubble
        function appendAIMessage(text) {
            // Convert simple markdown-like bold text (optional, Gemini returns markdown occasionally)
            const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            const html = `
                <div class="flex items-end gap-3 group">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-primary to-orange-400 flex items-center justify-center shadow-sm shrink-0 text-white">
                        <span class="material-symbols-outlined text-[18px]">auto_awesome</span>
                    </div>
                    <div class="flex flex-col gap-1 max-w-[85%]">
                        <span class="text-xs text-slate-500 dark:text-slate-400 ml-1 font-medium">Homely AI</span>
                        <div class="p-4 bg-primary text-white rounded-2xl rounded-bl-sm shadow-soft text-[15px] leading-relaxed">
                            <p>${formattedText.replace(/\n/g, '<br/>')}</p>
                        </div>
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
            return chatContainer.lastElementChild; // return the bubble just in case
        }

        // Function to show typing indicator
        function appendTypingIndicator() {
            const id = 'typing-' + Date.now();
            const html = `
                <div id="${id}" class="flex items-end gap-3 group">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-primary to-orange-400 flex items-center justify-center shadow-sm shrink-0 text-white">
                        <span class="material-symbols-outlined text-[18px]">auto_awesome</span>
                    </div>
                    <div class="p-4 bg-primary/80 text-white rounded-2xl rounded-bl-sm shadow-soft text-[15px]">
                        <div class="flex gap-1 items-center h-5">
                            <div class="w-2 h-2 bg-white rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                            <div class="w-2 h-2 bg-white rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                            <div class="w-2 h-2 bg-white rounded-full animate-bounce"></div>
                        </div>
                    </div>
                </div>
            `;
            chatContainer.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
            return id;
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        let chatHistory = [];
        let globalPantryInventory = "No ingredients detected yet or the pantry is empty.";

        // Preload the pantry inventory automatically so the AI ALWAYS knows what the user has
        fetch('/src/pages/pantry.html').then(async (res) => {
            const html = await res.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            let ingredients = [];
            doc.querySelectorAll('.qty-val').forEach(qtySpan => {
                if (parseInt(qtySpan.textContent) > 0) {
                    const container = qtySpan.closest('.p-3') || qtySpan.closest('div.flex.items-center.p-3');
                    if (container) {
                        const h3 = container.querySelector('h3');
                        if (h3) ingredients.push(h3.textContent.replace(/\s+/g, ' ').trim());
                    }
                }
            });
            if (ingredients.length > 0) {
                globalPantryInventory = ingredients.join(', ');
            }
        }).catch(err => console.error(err));

        // The actual API call to Google Gemini
        async function fetchGeminiResponse(userText) {

            chatHistory.push({
                role: "user",
                parts: [{ text: userText }]
            });

            // Construct the REST URL for Gemini-2.5-flash
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: {
                            parts: [{
                                text: `You are Homely AI, a friendly and highly accurate culinary kitchen assistant. 
                            CRITICAL SYSTEM KNOWLEDGE: The user's CURRENT PANTRY INVENTORY is: [ ${globalPantryInventory} ]. 
                            If the user explicitly asks to cook using ONLY what they have, or asks to cook from their pantry, you MUST strictly use only those items from their inventory list plus basic staples (water, salt, oil, pepper, sugar). 
                            However, if the user asks for generic recipes or asks to cook something NOT restricted to their pantry, you are fully free to suggest any ingredients.
                            When generating a step-by-step guide, ensure it is exclusively for the recipe currently being discussed. Format output cleanly. Introduce yourself briefly in your first response.` }]
                        },
                        contents: chatHistory
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const responseText = data.candidates[0].content.parts[0].text;

                chatHistory.push({
                    role: "model",
                    parts: [{ text: responseText }]
                });

                return responseText;
            } catch (error) {
                console.error("API Error:", error);
                chatHistory.pop(); // Remove failed user message from memory
                return "Oops, my kitchen servers had a hiccup connecting to the AI brain. Please try your request again in a moment!";
            }
        }

        // Handle Send Action
        async function handleSend() {
            const text = chatInput.value.trim();
            if (!text) return;

            // 1. Render User Message
            appendUserMessage(text);
            chatInput.value = '';

            // 2. Render Temporary "Typing..." Animation
            const typingId = appendTypingIndicator();

            // 3. Await Gemini API
            const responseText = await fetchGeminiResponse(text);

            // 4. Remove Typing Marker and Render AI Response
            document.getElementById(typingId).remove();
            appendAIMessage(responseText);
        }

        // Event Listeners
        if (sendBtn) {
            sendBtn.onclick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                handleSend();
            };
        }

        if (chatInput) {
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    e.stopPropagation();
                    handleSend();
                }
            });
        }

        // Quick Suggestion Prompts
        const quickBtns = document.querySelectorAll('.quick-prompt-btn');
        quickBtns.forEach(btn => {
            btn.onclick = async (e) => {
                e.preventDefault();
                e.stopPropagation();
                // Get the text from the button, ignoring the material icon text
                let promptText = btn.textContent.replace(/kitchen|favorite|timer|list_alt|menu_book/g, '').trim();

                // Add contextual hints based on button clicked
                if (promptText === "Cook from Pantry") promptText = "Can you suggest 6-8 different dishes I can make strictly using ONLY the ingredients currently in my pantry? Please provide quick summaries.";
                if (promptText === "Healthy Options") promptText = "Give me 3 highly nutritious and healthy recipe options based on what we've been discussing, or in general if we haven't started.";
                if (promptText === "Quick 15-min") promptText = "What is a quick and delicious meal I can cook in under 15 minutes?";
                if (promptText === "Step-by-Step Guide") promptText = "Please provide the detailed step-by-step cooking instructions exclusively for the recipe we just discussed. Do not switch recipes.";

                chatInput.value = promptText;
                handleSend();
            };
        });
    </script>
</body>

</html>
