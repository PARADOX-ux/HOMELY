<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Dietary Preferences - HOMELY</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#d57f30", "background-cream": "#fdfbd4", "background-dark": "#201912", surface: "#ffffff", neutral: "#825e34" }
                }
            }
        }
    </script>
</head>

<body
    class="bg-background-cream dark:bg-background-dark font-display min-h-screen text-neutral dark:text-gray-100 flex flex-col">
    <header
        class="pt-12 px-5 pb-4 flex justify-between items-center sticky top-0 bg-background-cream/90 dark:bg-background-dark/90 backdrop-blur-sm z-10 border-b border-opacity-10 border-neutral">
        <div class="flex items-center gap-3">
            <button
                class="w-10 h-10 flex items-center justify-center rounded-full bg-surface dark:bg-white/10 shadow-sm"
                onclick="window.goBack()">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold">Dietary Preferences</h1>
        </div>
        <button id="save-preferences-btn"
            class="text-primary font-bold px-4 py-2 bg-surface dark:bg-white/10 rounded-full shadow-sm">Save</button>
    </header>
    <main class="flex-1 p-5 gap-4 flex flex-col">
        <p class="opacity-70 text-sm mb-4">Select the preferences that apply to your household to filter
            recommendations.</p>
        <div class="space-y-4">
            <label
                class="flex items-center justify-between p-4 bg-surface dark:bg-white/5 rounded-2xl shadow-sm border border-neutral/10 cursor-pointer hover:border-primary/50 transition-colors">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">🌱</span>
                    <span class="font-bold">Vegan</span>
                </div>
                <input id="pref-vegan" type="checkbox"
                    class="w-6 h-6 rounded text-primary focus:ring-primary border-neutral/30 focus:ring-offset-0 bg-transparent" />
            </label>
            <label
                class="flex items-center justify-between p-4 bg-surface dark:bg-white/5 rounded-2xl shadow-sm border border-neutral/10 cursor-pointer hover:border-primary/50 transition-colors">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">🌾</span>
                    <span class="font-bold">Gluten-Free</span>
                </div>
                <input id="pref-gf" type="checkbox"
                    class="w-6 h-6 rounded text-primary focus:ring-primary border-neutral/30 focus:ring-offset-0 bg-transparent" />
            </label>
            <label
                class="flex items-center justify-between p-4 bg-surface dark:bg-white/5 rounded-2xl shadow-sm border border-neutral/10 cursor-pointer hover:border-primary/50 transition-colors">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">🌶️</span>
                    <span class="font-bold">Spicy</span>
                </div>
                <input id="pref-spicy" type="checkbox"
                    class="w-6 h-6 rounded text-primary focus:ring-primary border-neutral/30 focus:ring-offset-0 bg-transparent" />
            </label>
            <label
                class="flex items-center justify-between p-4 bg-surface dark:bg-white/5 rounded-2xl shadow-sm border border-neutral/10 cursor-pointer hover:border-primary/50 transition-colors">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">🥜</span>
                    <span class="font-bold">Nut-Free</span>
                </div>
                <input id="pref-nutfree" type="checkbox"
                    class="w-6 h-6 rounded text-primary focus:ring-primary border-neutral/30 focus:ring-offset-0 bg-transparent" />
            </label>
            <label
                class="flex items-center justify-between p-4 bg-surface dark:bg-white/5 rounded-2xl shadow-sm border border-neutral/10 cursor-pointer hover:border-primary/50 transition-colors">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">🥛</span>
                    <span class="font-bold">Dairy-Free</span>
                </div>
                <input id="pref-dairyfree" type="checkbox"
                    class="w-6 h-6 rounded text-primary focus:ring-primary border-neutral/30 focus:ring-offset-0 bg-transparent" />
            </label>
            <label
                class="flex items-center justify-between p-4 bg-surface dark:bg-white/5 rounded-2xl shadow-sm border border-neutral/10 cursor-pointer hover:border-primary/50 transition-colors">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">🥩</span>
                    <span class="font-bold">Keto</span>
                </div>
                <input id="pref-keto" type="checkbox"
                    class="w-6 h-6 rounded text-primary focus:ring-primary border-neutral/30 focus:ring-offset-0 bg-transparent" />
            </label>
        </div>
    </main>
    <script>
            (async function () {
                const saveBtn = document.getElementById('save-preferences-btn');
                const prefVegan = document.getElementById('pref-vegan');
                const prefGF = document.getElementById('pref-gf');
                const prefSpicy = document.getElementById('pref-spicy');
                const prefNutFree = document.getElementById('pref-nutfree');
                const prefDairyFree = document.getElementById('pref-dairyfree');
                const prefKeto = document.getElementById('pref-keto');

                // Load saved preferences if logged in
                if (window.homelyAuth && window.homelyAuth.currentUser && window.homelyFirestore) {
                    try {
                        const { doc, getDoc } = window.homelyFirestore;
                        const uid = window.homelyAuth.currentUser.uid;
                        const prefRef = doc(window.homelyDb, 'users', uid, 'preferences', 'dietary');
                        const snap = await getDoc(prefRef);

                        if (snap.exists()) {
                            const data = snap.data();
                            prefVegan.checked = data.vegan || false;
                            prefGF.checked = data.glutenFree || false;
                            prefSpicy.checked = data.spicy || false;
                            prefNutFree.checked = data.nutFree || false;
                            prefDairyFree.checked = data.dairyFree || false;
                            prefKeto.checked = data.keto || false;
                        }
                    } catch (err) {
                        console.error("Failed to load diet preferences:", err);
                    }
                }

                // Save preferences
                if (saveBtn) {
                    saveBtn.onclick = async (e) => {
                        e.preventDefault();
                        const originalText = saveBtn.innerText;
                        saveBtn.innerText = "Saving...";
                        saveBtn.disabled = true;

                        if (window.homelyAuth && window.homelyAuth.currentUser && window.homelyFirestore) {
                            try {
                                const { doc, setDoc } = window.homelyFirestore;
                                const uid = window.homelyAuth.currentUser.uid;
                                const prefRef = doc(window.homelyDb, 'users', uid, 'preferences', 'dietary');

                                await setDoc(prefRef, {
                                    vegan: prefVegan.checked,
                                    glutenFree: prefGF.checked,
                                    spicy: prefSpicy.checked,
                                    nutFree: prefNutFree.checked,
                                    dairyFree: prefDairyFree.checked,
                                    keto: prefKeto.checked,
                                    updatedAt: Date.now()
                                }, { merge: true });

                                saveBtn.innerText = "Saved!";
                                setTimeout(() => {
                                    window.goBack();
                                }, 500);
                            } catch (err) {
                                console.error("Failed to save diet preferences:", err);
                                saveBtn.innerText = "Error";
                                saveBtn.disabled = false;
                            }
                        } else {
                            // If not logged in, just go back
                            window.goBack();
                        }
                    };
                }
            })();
    </script>
</body>

</html>
