<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Profile - HOMELY</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d57f30",
                        "primary-content": "#ffffff",
                        "secondary": "#f3e5d8",
                        "accent": "#d47e30",
                        "neutral": "#825e34",
                        "neutral-light": "#a68b6c",
                        "background-cream": "#fdfbd4",
                        "background-light": "#f8f7f6",
                        "background-dark": "#201912",
                        "surface": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        "soft": "0 4px 20px -2px rgba(213, 127, 48, 0.08)",
                        "card": "0 2px 8px -2px rgba(130, 94, 52, 0.1)"
                    }
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-cream dark:bg-background-dark font-display min-h-screen flex flex-col antialiased text-neutral dark:text-gray-100 pb-20">
    <header
        class="pt-12 px-5 pb-4 flex justify-between items-center sticky top-0 z-10 bg-background-cream/90 dark:bg-background-dark/90 backdrop-blur-sm shadow-sm border-b border-[#E8E1D9] dark:border-[#2c241b]">
        <h1 class="text-2xl font-bold text-neutral dark:text-white leading-tight">Your Profile</h1>
        <button
            class="w-10 h-10 flex items-center justify-center rounded-full bg-surface dark:bg-white/10 shadow-card text-neutral dark:text-white nav-btn"
            data-target="settings.html">
            <span class="material-symbols-outlined text-[24px]">settings</span>
        </button>
    </header>

    <main class="flex-1 px-5 flex flex-col gap-6 py-6">
        <!-- User Info -->
        <div
            class="flex flex-col items-center bg-surface dark:bg-white/5 p-6 rounded-2xl shadow-card relative border border-[#E8E1D9] dark:border-white/5">
            <div
                class="h-28 w-28 rounded-full border-4 border-primary/20 overflow-hidden mb-4 shadow-inner relative z-10">
                <img id="profile-page-pic"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuClq2-LSd3UlmztGhun3El74l3w4kfpH-qB2Rd4UXLvKaoY0r_h8eXoN8DcRKMl1VHCFSUH5B-qeLDZjeNj0VMjz2kCdr4gBRo_E1nUnD0ur67pL8Q5shlzLkwKkLx8WFDGQT30xmHlpdca5O2rny1RiyCphObJiZ9Ncug9Y6hTNWnIno2wUWXFHAFDoAr2ri5MqZSAhtbNcL0AKhEHUKxpbywUTbn3Ogw8Qjy5qBgKYAqVeh2JF2kKO3jf2lDiUTgB2hBJWlAXkXU"
                    class="h-full w-full object-cover" alt="Profile Picture" />
            </div>
            <h2 id="profile-page-name" class="text-2xl font-bold text-neutral dark:text-white text-center">Chef</h2>
            <p id="profile-page-email" class="text-neutral-light dark:text-gray-400 font-medium text-sm mt-1">
                user@example.com</p>

            <button
                class="mt-5 bg-primary-light/50 dark:bg-primary/20 hover:bg-primary/10 text-primary px-6 py-2 rounded-full font-bold text-sm shadow-sm transition-colors border border-primary/20 nav-btn"
                data-target="edit_profile.html">Edit
                Profile</button>
        </div>

        <!-- Sections -->
        <div class="space-y-4">
            <div
                class="bg-surface dark:bg-white/5 rounded-2xl shadow-card overflow-hidden border border-[#E8E1D9] dark:border-white/5">
                <button
                    class="w-full flex items-center justify-between p-4 border-b border-neutral-light/10 hover:bg-neutral-light/5 transition-colors nav-btn"
                    data-target="dietary_preferences.html">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-primary text-[24px]">restaurant_menu</span>
                        <span class="font-bold text-neutral dark:text-gray-200 text-sm">Dietary Preferences</span>
                    </div>
                    <span class="material-symbols-outlined text-neutral-light">chevron_right</span>
                </button>
                <button
                    class="w-full flex items-center justify-between p-4 hover:bg-neutral-light/5 transition-colors nav-btn"
                    data-target="favorites.html">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-red-500 text-[24px] filled">menu_book</span>
                        <span class="font-bold text-neutral dark:text-gray-200 text-sm">My Cookbook (Saved)</span>
                    </div>
                    <span class="material-symbols-outlined text-neutral-light">chevron_right</span>
                </button>
            </div>

            <div
                class="bg-surface dark:bg-white/5 rounded-2xl shadow-card overflow-hidden mt-6 border border-[#E8E1D9] dark:border-white/5">
                <button id="logout-btn"
                    class="w-full flex items-center justify-between p-4 hover:bg-red-50 dark:hover:bg-red-900/10 transition-colors">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-red-600 text-[24px]">logout</span>
                        <span class="font-bold text-red-600 text-sm">Sign Out</span>
                    </div>
                </button>
            </div>
        </div>
    </main>

    <div id="bottom-nav"></div>
</body>

</html>
