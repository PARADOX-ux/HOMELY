<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Edit Profile - HOMELY</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#d57f30", "background-cream": "#fdfbd4", "background-dark": "#201912", surface: "#ffffff", neutral: "#825e34" }
                }
            }
        }
    </script>
</head>

<body
    class="bg-background-cream dark:bg-background-dark font-display min-h-screen text-neutral dark:text-gray-100 flex flex-col">
    <header
        class="pt-12 px-5 pb-4 flex justify-between items-center sticky top-0 bg-background-cream/90 dark:bg-background-dark/90 backdrop-blur-sm z-10 border-b border-opacity-10 border-neutral">
        <div class="flex items-center gap-3">
            <button
                class="w-10 h-10 flex items-center justify-center rounded-full bg-surface dark:bg-white/10 shadow-sm"
                onclick="window.goBack()">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold">Edit Profile</h1>
        </div>
        <button id="save-profile-btn"
            class="text-primary font-bold px-4 py-2 bg-surface dark:bg-white/10 rounded-full shadow-sm">Save</button>
    </header>
    <main class="flex-1 p-5 gap-6 flex flex-col items-center pt-8">
        <div class="relative w-32 h-32 rounded-full border-4 border-surface shadow-md overflow-hidden bg-white/20">
            <img id="profile-pic-img"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuClq2-LSd3UlmztGhun3El74l3w4kfpH-qB2Rd4UXLvKaoY0r_h8eXoN8DcRKMl1VHCFSUH5B-qeLDZjeNj0VMjz2kCdr4gBRo_E1nUnD0ur67pL8Q5shlzLkwKkLx8WFDGQT30xmHlpdca5O2rny1RiyCphObJiZ9Ncug9Y6hTNWnIno2wUWXFHAFDoAr2ri5MqZSAhtbNcL0AKhEHUKxpbywUTbn3Ogw8Qjy5qBgKYAqVeh2JF2kKO3jf2lDiUTgB2hBJWlAXkXU"
                class="w-full h-full object-cover opacity-80" alt="Avatar" />
            <div
                class="absolute inset-0 bg-black/40 flex items-center justify-center cursor-pointer hover:bg-black/50 transition-colors">
                <span class="material-symbols-outlined text-white text-[32px]">photo_camera</span>
            </div>
        </div>
        <div class="w-full max-w-sm space-y-4 w-full mt-4">
            <div class="space-y-1">
                <label class="text-sm font-bold opacity-80">Full Name</label>
                <input id="profile-name-input" type="text" placeholder="Your Name"
                    class="w-full bg-surface dark:bg-white/5 border-none rounded-xl p-4 shadow-sm focus:ring-2 focus:ring-primary" />
            </div>
            <div class="space-y-1">
                <label class="text-sm font-bold opacity-80">Email Address (Read Only)</label>
                <input id="profile-email-input" type="email" disabled
                    class="w-full bg-surface/50 dark:bg-white/5 border-none rounded-xl p-4 shadow-sm opacity-60" />
            </div>
            <div class="space-y-1">
                <label class="text-sm font-bold opacity-80">Location</label>
                <input id="profile-location-input" type="text" placeholder="e.g. New York, NY"
                    class="w-full bg-surface dark:bg-white/5 border-none rounded-xl p-4 shadow-sm focus:ring-2 focus:ring-primary" />
            </div>
        </div>
    </main>

    <script>
            (async function () {
                const saveBtn = document.getElementById('save-profile-btn');
                const nameInput = document.getElementById('profile-name-input');
                const emailInput = document.getElementById('profile-email-input');
                const locationInput = document.getElementById('profile-location-input');
                const profilePic = document.getElementById('profile-pic-img');

                // Wait a brief moment to ensure Firebase is ready if routing from SPA
                setTimeout(async () => {
                    if (window.homelyAuth && window.homelyAuth.currentUser) {
                        const user = window.homelyAuth.currentUser;

                        // Set Auth Defaults
                        if (user.displayName) nameInput.value = user.displayName;
                        if (user.email) emailInput.value = user.email;
                        if (user.photoURL) profilePic.src = user.photoURL;

                        // Override with Firestore Data
                        if (window.homelyFirestore) {
                            try {
                                const { doc, getDoc } = window.homelyFirestore;
                                const profRef = doc(window.homelyDb, 'users', user.uid, 'profile', 'info');
                                const snap = await getDoc(profRef);

                                if (snap.exists()) {
                                    const data = snap.data();
                                    if (data.name) nameInput.value = data.name;
                                    if (data.location) locationInput.value = data.location;
                                }
                            } catch (err) {
                                console.error("Failed to load profile:", err);
                            }
                        }
                    }
                }, 300);

                if (saveBtn) {
                    saveBtn.onclick = async (e) => {
                        e.preventDefault();
                        const originalText = saveBtn.innerText;
                        saveBtn.innerText = "Saving...";
                        saveBtn.disabled = true;

                        if (window.homelyAuth && window.homelyAuth.currentUser && window.homelyFirestore) {
                            try {
                                const { doc, setDoc } = window.homelyFirestore;
                                const uid = window.homelyAuth.currentUser.uid;
                                const profRef = doc(window.homelyDb, 'users', uid, 'profile', 'info');

                                await setDoc(profRef, {
                                    name: nameInput.value.trim(),
                                    location: locationInput.value.trim(),
                                    updatedAt: Date.now()
                                }, { merge: true });

                                saveBtn.innerText = "Saved!";
                                setTimeout(() => {
                                    window.goBack();
                                }, 500);
                            } catch (err) {
                                console.error("Failed to save profile:", err);
                                saveBtn.innerText = "Error";
                                saveBtn.disabled = false;
                            }
                        } else {
                            window.goBack();
                        }
                    };
                }
            })();
    </script>
</body>

</html>
