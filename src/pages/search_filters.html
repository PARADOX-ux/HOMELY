<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Search Filters - HOMELY</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#d57f30", "background-cream": "#fdfbd4", "background-dark": "#201912", surface: "#ffffff", neutral: "#825e34" }
                }
            }
        }
    </script>
</head>

<body
    class="bg-background-cream dark:bg-background-dark font-display min-h-screen text-neutral dark:text-gray-100 flex flex-col">
    <header
        class="pt-12 px-5 pb-4 flex justify-between items-center sticky top-0 bg-background-cream/90 dark:bg-background-dark/90 backdrop-blur-sm z-10 border-b border-opacity-10 border-neutral">
        <div class="flex items-center gap-3">
            <button
                class="w-10 h-10 flex items-center justify-center rounded-full bg-surface dark:bg-white/10 shadow-sm"
                onclick="window.goBack()">
                <span class="material-symbols-outlined">close</span>
            </button>
            <h1 class="text-xl font-bold">Filters</h1>
        </div>
        <button class="text-primary font-bold px-4 py-2 bg-surface dark:bg-white/10 rounded-full shadow-sm"
            onclick="window.goBack()">Apply</button>
    </header>
    <main class="flex-1 p-5 space-y-6">
        <div>
            <h3 class="font-bold text-lg mb-3">Meal Type</h3>
            <div class="flex flex-wrap gap-2">
                <span class="px-4 py-2 bg-primary text-white rounded-full font-medium shadow-sm">All</span>
                <span
                    class="px-4 py-2 bg-surface dark:bg-white/5 border border-neutral/10 rounded-full font-medium">Breakfast</span>
                <span
                    class="px-4 py-2 bg-surface dark:bg-white/5 border border-neutral/10 rounded-full font-medium">Lunch</span>
                <span
                    class="px-4 py-2 bg-surface dark:bg-white/5 border border-neutral/10 rounded-full font-medium">Dinner</span>
                <span
                    class="px-4 py-2 bg-surface dark:bg-white/5 border border-neutral/10 rounded-full font-medium">Snack</span>
            </div>
        </div>
        <div>
            <h3 class="font-bold text-lg mb-3">Max Cooking Time</h3>
            <input type="range" class="w-full accent-primary" min="5" max="120" value="45" />
            <div class="flex justify-between text-sm opacity-70 font-bold mt-1">
                <span>5m</span>
                <span>45m</span>
                <span>2h+</span>
            </div>
        </div>
        <div>
            <h3 class="font-bold text-lg mb-3">Difficulty</h3>
            <div class="flex flex-wrap gap-2">
                <span
                    class="px-4 py-2 bg-surface dark:bg-white/5 border border-neutral/10 rounded-full font-medium">Easy</span>
                <span class="px-4 py-2 bg-primary text-white rounded-full font-medium shadow-sm">Medium</span>
                <span
                    class="px-4 py-2 bg-surface dark:bg-white/5 border border-neutral/10 rounded-full font-medium">Hard</span>
            </div>
        </div>
    </main>
</body>

</html>
