    <script>
            // Use a self-executing function so 'let' variables don't conflict globally if SPA re-injects
            (function () {
                const chips = document.querySelectorAll('button.group.relative');
                let pendingItems = JSON.parse(localStorage.getItem('homely_pantry_additions') || '[]');

                // Init count
                const countSpan = document.getElementById('selected-items-count');
                if (countSpan) countSpan.textContent = pendingItems.length + ' items selected';

                // Check initially active chips in HTML and sync
                chips.forEach(chip => {
                    const nameSpan = chip.querySelector('span.font-medium');
                    if (!nameSpan) return;
                    const name = nameSpan.textContent.trim();

                    if (chip.classList.contains('bg-primary') && !pendingItems.includes(name)) {
                        pendingItems.push(name);
                    } else if (!chip.classList.contains('bg-primary') && pendingItems.includes(name)) {
                        // Force the UI to reflect the stored state
                        chip.classList.add('bg-primary', 'text-white', 'shadow-primary/20');
                        chip.classList.remove('bg-surface-light', 'dark:bg-surface-dark', 'text-slate-700', 'dark:text-slate-200', 'ring-1', 'shadow-sm');
                        const iconSpan = chip.querySelector('.material-symbols-outlined');
                        if (iconSpan) iconSpan.textContent = 'check';
                        const iconContainer = chip.querySelector('div.bg-wood-tone\\/10, div.dark\\:bg-white\\/10');
                        if (iconContainer) {
                            iconContainer.classList.add('bg-white/20');
                            iconContainer.classList.remove('bg-wood-tone/10', 'dark:bg-white/10', 'text-wood-tone', 'dark:text-primary');
                        }
                    }

                    chip.onclick = (e) => {
                        e.preventDefault();
                        const isSelected = chip.classList.contains('bg-primary');
                        if (isSelected) {
                            // Deselect
                            chip.classList.remove('bg-primary', 'text-white', 'shadow-primary/20');
                            chip.classList.add('bg-surface-light', 'dark:bg-surface-dark', 'text-slate-700', 'dark:text-slate-200', 'ring-1', 'shadow-sm');
                            const iconSpan = chip.querySelector('.material-symbols-outlined');
                            if (iconSpan) iconSpan.textContent = 'add';
                            const iconContainer = chip.querySelector('div.bg-white\\/20');
                            if (iconContainer) {
                                iconContainer.classList.remove('bg-white/20');
                                iconContainer.classList.add('bg-wood-tone/10', 'dark:bg-white/10', 'text-wood-tone', 'dark:text-primary');
                            }

                            pendingItems = pendingItems.filter(n => n !== name);
                        } else {
                            // Select
                            chip.classList.add('bg-primary', 'text-white', 'shadow-primary/20');
                            chip.classList.remove('bg-surface-light', 'dark:bg-surface-dark', 'text-slate-700', 'dark:text-slate-200', 'ring-1', 'shadow-sm');
                            const iconSpan = chip.querySelector('.material-symbols-outlined');
                            if (iconSpan) iconSpan.textContent = 'check';
                            const iconContainer = chip.querySelector('div.bg-wood-tone\\/10, div.dark\\:bg-white\\/10');
                            if (iconContainer) {
                                iconContainer.classList.add('bg-white/20');
                                iconContainer.classList.remove('bg-wood-tone/10', 'dark:bg-white/10', 'text-wood-tone', 'dark:text-primary');
                            }

                            if (!pendingItems.includes(name)) {
                                pendingItems.push(name);
                            }
                        }

                        localStorage.setItem('homely_pantry_additions', JSON.stringify(pendingItems));
                        if (countSpan) countSpan.textContent = pendingItems.length + ' items selected';
                    };
                });

                // Sync initial state
                localStorage.setItem('homely_pantry_additions', JSON.stringify(pendingItems));
                if (countSpan) countSpan.textContent = pendingItems.length + ' items selected';

                // Handle Firebase Saving on Add to Pantry Click
                const addBtn = document.getElementById('add-to-pantry-btn');
                if (addBtn) {
                    addBtn.onclick = async (e) => {
                        e.preventDefault();
                        const oldText = addBtn.innerHTML;
                        addBtn.innerHTML = '<span class="text-white font-medium text-sm w-full text-center">Saving to Cloud...</span>';

                        // Save to Firebase Database (Firestore)
                        if (window.homelyAuth && window.homelyAuth.currentUser && window.homelyFirestore) {
                            try {
                                const { doc, setDoc } = window.homelyFirestore;
                                const db = window.homelyDb;
                                const uid = window.homelyAuth.currentUser.uid;

                                const promises = pendingItems.map(itemName => {
                                    const safeId = itemName.toLowerCase().replace(/[^a-z0-9]/g, '_');
                                    const pantryRef = doc(db, 'users', uid, 'pantry', safeId);
                                    return setDoc(pantryRef, {
                                        name: itemName,
                                        quantity: 1,
                                        addedAt: Date.now()
                                    }, { merge: true });
                                });
                                await Promise.all(promises);
                                console.log("Successfully synced ingredients to user cloud pantry.");
                            } catch (err) {
                                console.error("Firebase sync failed:", err);
                            }
                        }

                        // Always save locally so the immediate ui updates
                        localStorage.setItem('homely_pantry_additions', JSON.stringify(pendingItems));

                        // Use global router
                        if (window.navigate) {
                            window.navigate('pantry.html');
                        } else {
                            // Fallback
                            window.location.href = '/?page=pantry.html';
                        }
                    };
                }

                // Add Real-time Search functionality
                const searchInput = document.getElementById('ingredient-search');
                if (searchInput) {
                    searchInput.addEventListener('input', (e) => {
                        const term = e.target.value.toLowerCase();
                        chips.forEach(chip => {
                            const nameSpan = chip.querySelector('span.font-medium');
                            if (nameSpan) {
                                const name = nameSpan.textContent.toLowerCase();
                                if (name.includes(term)) {
                                    chip.style.display = 'flex';
                                } else {
                                    chip.style.display = 'none';
                                }
                            }
                        });

                        // Optionally hide empty categories
                        const sections = document.querySelectorAll('main section');
                        sections.forEach(sec => {
                            const visibleChips = sec.querySelectorAll('button.group.relative[style="display: flex;"], button.group.relative:not([style*="display: none;"])');
                            if (visibleChips.length === 0) {
                                sec.style.display = 'none';
                            } else {
                                sec.style.display = 'block';
                            }
                        });
                    });
                }
            })();
    </script>
</body>

</html>
