<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Order Ingredients - HOMELY</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#d57f30", "background-cream": "#fdfbd4", "background-dark": "#201912", surface: "#ffffff", neutral: "#825e34" }
                }
            }
        }
    </script>
</head>

<body
    class="bg-background-cream dark:bg-background-dark font-display min-h-screen text-neutral dark:text-gray-100 flex flex-col">
    <header
        class="pt-12 px-5 pb-4 flex items-center gap-3 sticky top-0 bg-background-cream/90 dark:bg-background-dark/90 backdrop-blur-sm z-10 border-b border-opacity-10 border-neutral">
        <button
            class="w-10 h-10 flex items-center justify-center rounded-full bg-surface dark:bg-white/10 shadow-sm nav-btn"
            data-target="smart_grocery_list.html">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h1 class="text-xl font-bold">Checkout</h1>
    </header>
    <main class="flex-1 px-5 pt-6 pb-32">
        <div
            class="bg-surface dark:bg-white/5 rounded-2xl p-5 shadow-card border border-neutral/10 mb-6 flex gap-4 items-center cursor-pointer hover:border-primary transition-colors">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Instacart_logo_and_wordmark.svg/2560px-Instacart_logo_and_wordmark.svg.png"
                class="h-8 object-contain" alt="Instacart" />
            <div class="flex-1 text-right text-sm font-bold opacity-70 text-right">Delivery via Instacart</div>
        </div>

        <h2 class="text-lg font-bold mb-3">Order Summary</h2>
        <div class="bg-surface dark:bg-white/5 rounded-2xl p-5 shadow-sm border border-neutral/10 space-y-4">
            <div class="flex justify-between items-center opacity-80">
                <span class="font-medium">Selected Ingredients (4)</span>
                <span class="font-bold">$22.40</span>
            </div>
            <div class="flex justify-between items-center opacity-80 border-b border-neutral/10 pb-4">
                <span class="font-medium">Estimated Taxes & Fees</span>
                <span class="font-bold">$4.50</span>
            </div>
            <div class="flex justify-between items-center text-lg">
                <span class="font-bold text-neutral dark:text-white">Total</span>
                <span class="font-bold text-primary">$26.90</span>
            </div>
        </div>

        <button
            class="mt-8 w-full bg-primary hover:bg-primary/90 text-white rounded-full py-4 text-lg font-bold shadow-lg shadow-primary/30 flex justify-center items-center gap-2 nav-btn"
            data-target="user_dashboard.html">
            <span class="material-symbols-outlined">shopping_bag</span>
            Place Order
        </button>
    </main>
</body>

</html>
