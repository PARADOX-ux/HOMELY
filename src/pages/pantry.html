    <!-- Bottom Navigation placeholder -->
    <div id="bottom-nav"></div>

    <script>
            (async function () {
                let pendingAdditions = JSON.parse(localStorage.getItem('homely_pantry_additions') || '[]');

                // If logged in, fetch authoritative list from Firebase
                if (window.homelyAuth && window.homelyAuth.currentUser && window.homelyFirestore) {
                    try {
                        const { collection, getDocs } = window.homelyFirestore;
                        const db = window.homelyDb;
                        const uid = window.homelyAuth.currentUser.uid;
                        const pantryQuery = await getDocs(collection(db, 'users', uid, 'pantry'));

                        const firebaseItems = [];
                        pantryQuery.forEach(doc => {
                            const data = doc.data();
                            if (data.name) firebaseItems.push(data.name);
                        });

                        // Merge firebase items with any lingering local items
                        pendingAdditions = [...new Set([...pendingAdditions, ...firebaseItems])];
                    } catch (err) {
                        console.error("Error fetching pantry from Firebase:", err);
                    }
                }

                if (pendingAdditions.length > 0) {
                    // Find the sections container
                    const vegSectionTitles = Array.from(document.querySelectorAll('h2')).filter(h2 => h2.textContent.includes('Vegetables'));
                    let targetContainer = null;

                    if (vegSectionTitles.length > 0) {
                        targetContainer = vegSectionTitles[0].closest('section').querySelector('.space-y-3');
                    } else {
                        // Fallback: just grab the first .space-y-3 we can find
                        targetContainer = document.querySelector('.space-y-3');
                    }

                    if (targetContainer) {
                        // Gather all existing item titles dynamically to avoid dupes
                        const existingTitles = Array.from(document.querySelectorAll('h3')).map(h3 => h3.textContent.trim().toLowerCase());

                        pendingAdditions.forEach(itemName => {
                            if (existingTitles.includes(itemName.toLowerCase())) return; // skip if already in UI

                            const html = `
                            <div class="flex items-center p-3 bg-white dark:bg-[#2c241b] rounded-2xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] ring-1 ring-primary/20 transition-all zoom-in">
                                <div class="h-16 w-16 rounded-xl bg-primary/10 flex flex-col items-center justify-center shrink-0">
                                    <span class="material-symbols-outlined text-primary text-2xl">eco</span>
                                </div>
                                <div class="ml-4 flex-1 min-w-0">
                                    <div class="flex flex-col">
                                        <h3 class="font-bold text-[#4A3B2C] dark:text-[#e0d8cf] text-lg leading-tight truncate">${itemName}</h3>
                                        <p class="text-xs text-[#8b725b] mt-1 font-medium flex items-center gap-1">
                                            <span class="material-symbols-outlined text-[12px] text-green-500">add_circle</span> Just Added
                                        </p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-3 bg-[#F9F7F5] dark:bg-[#1e1914] rounded-full p-1 ml-2">
                                    <button class="qty-minus w-7 h-7 flex items-center justify-center rounded-full bg-white dark:bg-[#2c241b] text-[#4A3B2C] shadow-sm hover:text-primary transition-colors"><span class="material-symbols-outlined text-[16px]">remove</span></button>
                                    <span class="qty-val font-bold text-[#4A3B2C] dark:text-[#e0d8cf] w-4 text-center">1</span>
                                    <button class="qty-plus w-7 h-7 flex items-center justify-center rounded-full bg-white dark:bg-[#2c241b] text-[#4A3B2C] shadow-sm hover:text-primary transition-colors"><span class="material-symbols-outlined text-[16px]">add</span></button>
                                </div>
                            </div>
                            `;
                            targetContainer.insertAdjacentHTML('beforeend', html);
                        });

                        // Clear pending additions after injecting them locally
                        localStorage.setItem('homely_pantry_additions', JSON.stringify([]));
                    }
                }
            })();
    </script>
