<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Homely - Welcome &amp; Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d57f30",
                        "secondary": "#8D5A2B", // Deep brown text
                        "cream": "#FDFBD4", // Specific background request
                        "background-light": "#f8f7f6",
                        "background-dark": "#201912",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .glass-card {
            background: rgba(253, 251, 212, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Custom scrollbar hiding for clean mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display h-screen w-full overflow-hidden flex flex-col">
    <!-- Header Image Section (Top 30%) -->
    <div class="h-[30%] w-full relative shrink-0">
        <!-- Image with overlay gradient for better text/card contrast transition -->
        <div class="absolute inset-0 bg-cover bg-center"
            data-alt="Top down view of various colorful Indian spices in bowls and spoons on a dark surface, softly blurred"
            style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDzYSz-CSDNDR-i4ZlxLyFSt7Pvc-UmtrPhZjVOECQif4Qxax11dWeCjpI4k32peqYJtY1hVLSYIAovS0gzFPnIfOKJGAEc7F9FNIItWf8SdGBo9NPYLWNUF4HyjpVqTiMo8oJDRRlkTwVYrizo0ndQygahHv6LmTl85QblaMqCQQ8LjNJnrNRaJUT7E2KOTy6e8ozHPz_PqChlogA0LlBtYNnEFDTLdojgGBac7UGEUwnbll_LyYEtuTqmkcmam16gbSNEM902HRE');">
        </div>
        <div class="absolute inset-0 bg-gradient-to-b from-black/10 to-black/40"></div>
    </div>
    <!-- Main Content Card (Bottom 60% approx, overlapping upwards) -->
    <div
        class="flex-1 -mt-10 z-10 w-full flex flex-col overflow-hidden rounded-t-[2rem] glass-card shadow-[0_-8px_30px_rgba(0,0,0,0.12)]">
        <!-- Scrollable content area -->
        <div class="flex-1 overflow-y-auto no-scrollbar px-6 pt-5 pb-2 flex flex-col">
            <!-- Handle bar visual indicator -->
            <div class="w-12 h-1.5 bg-secondary/20 rounded-full mx-auto mb-4 shrink-0"></div>
            <!-- Headers -->
            <div class="text-center mb-6">
                <h1 class="text-secondary text-[26px] font-bold tracking-tight mb-1">Welcome to your kitchen</h1>
                <p class="text-secondary/70 text-sm font-medium">Sign in to start cooking.</p>
            </div>
            <!-- Login Form -->
            <form id="login-form" class="space-y-4 w-full max-w-sm mx-auto" onsubmit="event.preventDefault();">
                <!-- Email Input -->
                <div class="space-y-2">
                    <label class="sr-only" for="email">Email</label>
                    <div class="relative group">
                        <div
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-primary/60 group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-outlined text-[20px]">mail</span>
                        </div>
                        <input
                            class="w-full bg-white/60 border border-secondary/20 focus:border-primary focus:ring-primary/20 rounded-full py-4 pl-12 pr-4 text-secondary placeholder:text-secondary/70 font-medium outline-none transition-all hover:bg-white/80 focus:bg-white h-14"
                            id="email" placeholder="Email Address" type="email" />
                    </div>
                </div>
                <!-- Password Input -->
                <div class="space-y-2">
                    <label class="sr-only" for="password">Password</label>
                    <div class="relative group">
                        <div
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-primary/60 group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-outlined text-[20px]">lock</span>
                        </div>
                        <input
                            class="w-full bg-white/60 border border-secondary/20 focus:border-primary focus:ring-primary/20 rounded-full py-4 pl-12 pr-12 text-secondary placeholder:text-secondary/70 font-medium outline-none transition-all hover:bg-white/80 focus:bg-white h-14"
                            id="password" placeholder="Password" type="password" />
                        <button
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-secondary/40 hover:text-primary transition-colors flex items-center justify-center"
                            type="button">
                            <span class="material-symbols-outlined text-[20px]">visibility</span>
                        </button>
                    </div>
                </div>
                <!-- Forgot Password -->
                <div class="flex justify-end">
                    <a class="text-sm font-semibold text-primary hover:text-secondary transition-colors" href="#">
                        Forgot Password?
                    </a>
                </div>
                <!-- Main Action Button -->
                <button type="button" data-target="user_dashboard.html"
                    class="w-full bg-primary hover:bg-primary/90 text-white font-bold text-lg h-14 rounded-full shadow-lg shadow-primary/30 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2">
                    Login
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
                </button>
            </form>
            <!-- Divider -->
            <div class="relative py-4 w-full max-w-sm mx-auto">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-secondary/20"></div>
                </div>
                <div class="relative flex justify-center">
                    <span class="bg-[#FDFBD4] px-4 text-[10px] font-bold text-secondary/80 uppercase tracking-widest">Or
                        continue with</span>
                </div>
            </div>
            <!-- Social Logins -->
            <div class="flex justify-center gap-6 mb-2">
                <button id="google-login-btn"
                    class="w-14 h-14 rounded-full bg-white border border-secondary/5 flex items-center justify-center shadow-sm hover:bg-gray-50 transition-colors group">
                    <!-- Google SVG -->
                    <svg class="w-6 h-6 group-hover:scale-110 transition-transform" viewbox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4"></path>
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853"></path>
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05"></path>
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335"></path>
                    </svg>
                </button>
                <button
                    class="w-14 h-14 rounded-full bg-white border border-secondary/5 flex items-center justify-center shadow-sm hover:bg-gray-50 transition-colors group">
                    <!-- Apple SVG -->
                    <svg class="w-6 h-6 text-black group-hover:scale-110 transition-transform" fill="currentColor"
                        viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M17.05 20.28c-.98.95-2.05.88-3.08.38-1.09-.54-2.08-.53-3.2 0-1.44.71-2.01.27-3.05-.82-2.31-2.42-2.58-6.15-1.07-8.15 1.1-1.45 2.87-1.68 4.04-1.61 1.07.07 2.05.51 2.67.51.6 0 1.78-.54 3.02-.45 1.05.08 2.37.5 3.3 1.4-2.91 1.34-2.46 5.43.6 6.8-.62 1.34-1.48 2.65-2.48 3.86-.75.9-1.54 1.54-2.27 1.54zM12.03 7.25c-.15-2.23 1.66-4.04 3.74-4.25.17 2.29-2.14 4.2-3.74 4.25z">
                        </path>
                    </svg>
                </button>
            </div>
            <!-- Footer Link -->
            <div class="mt-auto pt-2 pb-4 text-center">
                <p class="text-secondary/70 text-xs">
                    Don't have an account?
                    <a class="font-bold text-primary hover:text-secondary ml-1 transition-colors" href="#">Sign up</a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
