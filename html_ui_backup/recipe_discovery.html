<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Homely - Recipe Discovery</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "cream": "#FDFBD4",
                        "accent": "#D47E30",
                        "brown-dark": "#8D5A2B",
                        "brown-text": "#825E34",
                        "surface-dark": "#2c241b",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Plus Jakarta Sans", "sans-serif"],
                    },
                    borderRadius: {
                        "xl": "1.5rem",
                        "2xl": "2rem",
                        "3xl": "2.5rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(141, 90, 43, 0.2)',
                        'card': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
                    }
                },
            },
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body {
            min-height: max(884px, 100dvh);
            background-color: #FDFBD4;
        }
    </style>
</head>

<body
    class="bg-cream font-display text-brown-text min-h-screen flex flex-col overflow-hidden relative selection:bg-accent selection:text-white">
    <header class="flex items-center justify-between px-6 pt-14 pb-4 z-20 relative">
        <div class="flex flex-col">
            <h1 class="text-brown-dark text-3xl font-extrabold tracking-tight">What's cooking?</h1>
            <p class="text-brown-text/80 text-sm font-semibold mt-1">Based on your pantry...</p>
        </div>
        <button
            class="bg-white/80 backdrop-blur-sm p-3 rounded-full shadow-sm text-brown-dark hover:bg-white transition-colors nav-btn"
            data-target="user_dashboard.html">
            <span class="material-symbols-outlined">tune</span>
        </button>
    </header>
    <main
        class="flex-1 relative w-full max-w-md mx-auto px-4 py-2 flex flex-col justify-center items-center perspective-1000">
        <div
            class="absolute w-[90%] h-[68vh] bg-white/40 border border-white/20 rounded-[2.5rem] shadow-sm transform scale-90 translate-y-8 z-0">
        </div>
        <div
            class="absolute w-[95%] h-[68vh] bg-white/60 border border-white/30 rounded-[2.5rem] shadow-md transform scale-95 translate-y-4 z-10">
        </div>
        <div
            class="relative w-full h-[68vh] bg-white rounded-[2.5rem] shadow-card overflow-hidden z-20 group cursor-grab active:cursor-grabbing border-[3px] border-white">
            <div class="absolute inset-0 w-full h-full">
                <img alt="Bowl of rich orange paneer butter masala curry with naan bread"
                    class="w-full h-full object-cover"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuBk_jC5Rqi8VMpxAqG6iIwSpuXn6rHhyeJxfsdaCTDKLK8OhJZoO57Ni6y4T_9g6s6Zlj5AWlYV9gqDyA-RBXXLwB8kuTm8vQ4KHG3pd9LLgld0LaWGa4Z6Bx7zXgFRSiQaT3pjMqquF2YoDO78RGA6JXzrTH88P3_PokmgZ_iGAW-vEB3wx1nfDG2JAPTgidff1kM3tgTTm3HKAyygHopMKMRMwSqMX2J2KV03gYUHSJd-gUjbjpJGLfkLZoNQYBce7YaZw4kbhXU" />
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/30 to-transparent"></div>
            </div>
            <div
                class="absolute top-6 right-6 bg-accent text-white px-5 py-2.5 rounded-full shadow-lg backdrop-blur-sm flex items-center gap-2 animate-pulse border-2 border-white/20">
                <span class="material-symbols-outlined text-[20px] fill-current">auto_awesome</span>
                <span class="text-base font-bold tracking-wide">80% Match</span>
            </div>
            <div class="absolute bottom-0 left-0 w-full p-8 text-white flex flex-col gap-4">
                <div class="flex flex-wrap gap-2 mb-2">
                    <div
                        class="flex items-center gap-1.5 bg-white/20 backdrop-blur-md px-4 py-2 rounded-full border border-white/20 shadow-sm">
                        <span class="material-symbols-outlined text-[18px]">schedule</span>
                        <span class="text-sm font-bold">45 mins</span>
                    </div>
                    <div
                        class="flex items-center gap-1.5 bg-white/20 backdrop-blur-md px-4 py-2 rounded-full border border-white/20 shadow-sm">
                        <span class="material-symbols-outlined text-[18px]">eco</span>
                        <span class="text-sm font-bold">Veg</span>
                    </div>
                    <div
                        class="flex items-center gap-1.5 bg-white/20 backdrop-blur-md px-4 py-2 rounded-full border border-white/20 shadow-sm">
                        <span class="material-symbols-outlined text-[18px]">local_fire_department</span>
                        <span class="text-sm font-bold">Spicy</span>
                    </div>
                </div>
                <div>
                    <h2 class="text-[2rem] font-extrabold leading-none mb-2 tracking-tight">Paneer Butter Masala</h2>
                    <p class="text-gray-100 text-base font-medium line-clamp-2 opacity-95 leading-relaxed">Rich and
                        creamy curry made with paneer, spices, onions, tomatoes, cashews and butter.</p>
                </div>
                <div
                    class="mt-1 flex items-start gap-2 text-[#FFE8CC] text-xs font-semibold bg-black/40 w-fit px-4 py-2.5 rounded-xl backdrop-blur-md border border-white/10">
                    <span class="material-symbols-outlined text-[16px] mt-0.5">warning</span>
                    <span>Missing: Cashews, Heavy Cream</span>
                </div>
            </div>
        </div>
    </main>
    <div class="w-full max-w-md mx-auto px-8 pb-8 pt-6 flex items-center justify-between gap-6 z-20">
        <button
            class="flex-1 h-16 rounded-full bg-white border-2 border-[#EADEC9] shadow-soft flex items-center justify-center group active:scale-95 transition-all duration-200 hover:bg-gray-50 nav-btn"
            data-target="user_dashboard.html">
            <span
                class="material-symbols-outlined text-4xl text-brown-text/60 group-hover:text-red-500 transition-colors">close</span>
            <span class="sr-only">Skip</span>
        </button>
        <button
            class="h-12 w-12 rounded-full bg-white/80 border border-[#EADEC9] shadow-sm flex items-center justify-center text-brown-dark active:scale-95 transition-transform hover:bg-white nav-btn"
            data-target="recipe_details.html">
            <span class="material-symbols-outlined text-2xl">info</span>
            <span class="sr-only">Details</span>
        </button>
        <button
            class="flex-[1.5] h-16 rounded-full bg-brown-dark shadow-lg shadow-brown-dark/30 flex items-center justify-center gap-2 group active:scale-95 transition-all duration-200 hover:opacity-90 nav-btn"
            data-target="recipe_details.html">
            <span
                class="material-symbols-outlined text-3xl text-white group-hover:scale-110 transition-transform">favorite</span>
            <span class="text-white font-bold text-lg">Cook This</span>
        </button>
    </div>
</body>

</html>
