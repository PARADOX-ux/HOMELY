<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Settings - HOMELY</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#d57f30", "background-cream": "#fdfbd4", "background-dark": "#201912", surface: "#ffffff", neutral: "#825e34" }
                }
            }
        }
    </script>
</head>

<body
    class="bg-background-cream dark:bg-background-dark font-display min-h-screen text-neutral dark:text-gray-100 flex flex-col">
    <header
        class="pt-12 px-5 pb-4 flex items-center gap-3 sticky top-0 bg-background-cream/90 dark:bg-background-dark/90 backdrop-blur-sm z-10 border-b border-opacity-10 border-neutral">
        <button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface dark:bg-white/10 shadow-sm"
            onclick="window.goBack()">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h1 class="text-xl font-bold">App Settings</h1>
    </header>
    <main class="flex-1 p-5 space-y-6">
        <div class="bg-surface dark:bg-white/5 rounded-2xl shadow-sm border border-neutral/10 overflow-hidden">
            <div class="p-4 border-b border-neutral/10 flex justify-between items-center opacity-70">
                <span class="font-bold">Notifications</span>
                <input type="checkbox" class="toggle bg-neutral" checked />
            </div>
            <div class="p-4 border-b border-neutral/10 flex justify-between items-center opacity-70">
                <span class="font-bold">Dark Mode</span>
                <input type="checkbox" class="toggle bg-neutral" />
            </div>
            <div class="p-4 border-b border-neutral/10 flex justify-between items-center opacity-70">
                <span class="font-bold">Unit System (Metric/Imperial)</span>
                <span class="material-symbols-outlined">chevron_right</span>
            </div>
        </div>
        <div class="bg-surface dark:bg-white/5 rounded-2xl shadow-sm border border-neutral/10 overflow-hidden">
            <div class="p-4 border-b border-neutral/10 flex justify-between items-center opacity-70 text-red-600">
                <span class="font-bold">Clear Cache</span>
                <span class="material-symbols-outlined">delete</span>
            </div>
            <div class="p-4 border-b border-neutral/10 flex justify-between items-center opacity-70 text-red-600">
                <span class="font-bold">Delete Account</span>
                <span class="material-symbols-outlined">warning</span>
            </div>
        </div>
    </main>
</body>

</html>
